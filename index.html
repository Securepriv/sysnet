<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetChat Secure - Choix du mode de connexion</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #080a0d;
    --surface: #0f1217;
    --surface2: #141820;
    --border: #1c2130;
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.10);
    --accent-glow: rgba(0,229,160,0.25);
    --text: #dde4f0;
    --muted: #3d4a60;
    --muted2: #5a6a85;
    --danger: #ff4d6d;
    --warn: #f6ad55;
    --my-bg: #0b2a1e;
    --my-border: rgba(0,229,160,0.18);
    --their-bg: #111825;
    --their-border: #1c2130;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,229,160,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(0,180,255,0.03) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }

  header {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 20px;
    border-bottom:1px solid var(--border);
    background:rgba(8,10,13,0.95);
    backdrop-filter:blur(12px);
    flex-shrink:0;
  }

  .logo {
    font-family:'IBM Plex Mono',monospace;
    font-size:13px; font-weight:600;
    letter-spacing:0.18em; color:var(--accent);
    display:flex; align-items:center; gap:10px;
  }

  .lock-badge {
    display:flex; align-items:center; gap:5px;
    background:var(--accent-dim);
    border:1px solid rgba(0,229,160,0.2);
    border-radius:20px; padding:3px 10px;
    font-size:10px; letter-spacing:0.12em; color:var(--accent);
  }

  .status-pill {
    display:flex; align-items:center; gap:7px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px; letter-spacing:0.1em;
    color:var(--muted2); text-transform:uppercase;
  }

  .dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:all 0.3s; }
  .dot.online     { background:var(--accent); box-shadow:0 0 7px var(--accent-glow); animation:pulse 2s infinite; }
  .dot.connecting { background:var(--warn); animation:blink 0.7s infinite; }
  .dot.error      { background:var(--danger); }
  .dot.ready      { background:var(--accent); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  main { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; z-index:1; }

  .card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:32px 32px 28px;
    width:100%; max-width:500px;
    position:relative;
    animation: fadeInUp 0.4s ease;
  }
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(15px); }
    to { opacity:1; transform:translateY(0); }
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:14px 14px 0 0;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .card-section { margin-bottom:24px; }
  .card-section:last-child { margin-bottom:0; }

  .section-label {
    font-family:'IBM Plex Mono',monospace;
    font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted2);
    margin-bottom:12px; display:flex; align-items:center; gap:8px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .field { margin-bottom:10px; }

  label.fl {
    display:block; font-family:'IBM Plex Mono',monospace;
    font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted2); margin-bottom:6px;
  }

  input[type="text"], input[type="password"] {
    width:100%; background:var(--bg); border:1px solid var(--border); border-radius:7px;
    padding:10px 13px; font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--text);
    outline:none; transition:border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }

  .secret-wrap { position:relative; }
  .secret-wrap input { padding-right:42px; }
  .toggle-eye {
    position:absolute; right:11px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer; color:var(--muted2); padding:2px; transition:color 0.2s;
  }
  .toggle-eye:hover { color:var(--accent); }

  .btn {
    width:100%; padding:11px; border:none; border-radius:7px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px; letter-spacing:0.16em;
    text-transform:uppercase; cursor:pointer; transition:all 0.2s; font-weight:600;
  }
  .btn-primary { background:var(--accent); color:#080a0d; }
  .btn-primary:hover:not(:disabled) { box-shadow:0 0 22px var(--accent-glow); transform:translateY(-1px); }
  .btn-primary:active { transform:translateY(0); }

  .btn-secondary {
    background:var(--surface2);
    border:1px solid var(--border);
    color:var(--text);
  }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }

  .btn-group {
    display:flex;
    gap:10px;
    margin-top:10px;
  }
  .btn-group .btn { flex:1; }

  .error-msg {
    font-size:11px; color:var(--danger); font-family:'IBM Plex Mono',monospace;
    margin-top:10px; display:none; padding:8px 12px;
    background:rgba(255,77,109,0.08); border:1px solid rgba(255,77,109,0.2); border-radius:6px;
  }

  .info-msg {
    font-size:11px; color:var(--accent); font-family:'IBM Plex Mono',monospace;
    margin-top:10px; padding:8px 12px;
    background:var(--accent-dim); border:1px solid rgba(0,229,160,0.2); border-radius:6px;
    text-align:center;
  }

  .mode-selector {
    display:flex;
    gap:10px;
    margin-bottom:20px;
  }
  .mode-btn {
    flex:1;
    padding:8px;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:7px;
    color:var(--muted2);
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    cursor:pointer;
    transition:all 0.2s;
    text-align:center;
  }
  .mode-btn.active {
    border-color:var(--accent);
    color:var(--accent);
    background:var(--accent-dim);
  }

  #chat-screen { display:none; flex:1; flex-direction:column; overflow:hidden; }

  .chat-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; gap:10px;
  }
  .peer-info { display:flex; flex-direction:column; min-width:0; }
  .peer-name-display { font-weight:600; font-size:13px; color:var(--accent); }
  .session-meta { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--muted2); letter-spacing:0.08em; margin-top:2px; }

  .enc-badge {
    display:flex; align-items:center; gap:5px; font-family:'IBM Plex Mono',monospace;
    font-size:9px; letter-spacing:0.1em; color:var(--accent);
    background:var(--accent-dim); border:1px solid rgba(0,229,160,0.15);
    border-radius:20px; padding:3px 10px; white-space:nowrap; flex-shrink:0;
  }

  .btn-disc {
    background:none; border:1px solid var(--border); border-radius:5px; padding:4px 10px;
    font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.1em; color:var(--muted2);
    cursor:pointer; text-transform:uppercase; transition:all 0.2s; flex-shrink:0;
  }
  .btn-disc:hover { border-color:var(--danger); color:var(--danger); }

  #messages {
    flex:1; overflow-y:auto; padding:16px;
    display:flex; flex-direction:column; gap:8px; scroll-behavior:smooth;
  }
  #messages::-webkit-scrollbar { width:3px; }
  #messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .msg-wrap { display:flex; flex-direction:column; max-width:74%; animation:slideIn 0.18s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:none} }
  .msg-wrap.mine   { align-self:flex-end; align-items:flex-end; }
  .msg-wrap.theirs { align-self:flex-start; align-items:flex-start; }

  .msg-bubble {
    padding:9px 13px; border-radius:10px;
    font-size:13px; line-height:1.55; word-break:break-word; white-space:pre-wrap;
  }
  .msg-wrap.mine   .msg-bubble { background:var(--my-bg); border:1px solid var(--my-border); border-bottom-right-radius:2px; }
  .msg-wrap.theirs .msg-bubble { background:var(--their-bg); border:1px solid var(--their-border); border-bottom-left-radius:2px; }

  .msg-meta { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--muted); margin-top:4px; letter-spacing:0.05em; }

  .system-msg {
    text-align:center; font-family:'IBM Plex Mono',monospace; font-size:10px;
    color:var(--muted); letter-spacing:0.1em; padding:3px 0;
    display:flex; align-items:center; gap:8px;
  }
  .system-msg::before,.system-msg::after { content:''; flex:1; height:1px; background:var(--border); }

  .typing-wrap { align-self:flex-start; animation:slideIn 0.18s ease; }
  .typing-indicator {
    display:flex; align-items:center; gap:4px; padding:9px 13px;
    background:var(--their-bg); border:1px solid var(--their-border);
    border-radius:10px; border-bottom-left-radius:2px;
  }
  .td { width:5px; height:5px; border-radius:50%; background:var(--muted2); animation:tb 1.4s infinite; }
  .td:nth-child(2){animation-delay:0.2s} .td:nth-child(3){animation-delay:0.4s}
  @keyframes tb { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  .input-bar {
    display:flex; gap:9px; padding:12px 14px;
    border-top:1px solid var(--border); background:rgba(8,10,13,0.95);
    backdrop-filter:blur(10px); flex-shrink:0;
  }
  #msg-input {
    flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    padding:9px 13px; font-family:'IBM Plex Sans',sans-serif; font-size:13px; color:var(--text);
    outline:none; resize:none; max-height:100px; line-height:1.5;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  #msg-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }

  .send-btn {
    background:var(--accent); border:none; border-radius:8px;
    width:42px; height:42px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; color:#080a0d; flex-shrink:0;
  }
  .send-btn:hover:not(:disabled) { box-shadow:0 0 18px var(--accent-glow); transform:scale(1.05); }
  .send-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none !important; }

  #loading {
    display:none; position:fixed; inset:0;
    background:rgba(8,10,13,0.95); z-index:100;
    align-items:center; justify-content:center; flex-direction:column; gap:14px;
    backdrop-filter:blur(8px);
  }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.75s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .load-txt { font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.16em; color:var(--muted2); text-transform:uppercase; }

  .code-display {
    background:var(--bg);
    border:1px solid var(--accent);
    border-radius:7px;
    padding:15px;
    font-family:'IBM Plex Mono',monospace;
    font-size:20px;
    font-weight:600;
    color:var(--accent);
    text-align:center;
    letter-spacing:2px;
    margin:10px 0;
    word-break:break-all;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="load-txt" id="load-txt">Initialisation...</div>
</div>

<header>
  <div class="logo">
    NetChat Secure
    <div class="lock-badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      AES-256
    </div>
  </div>
  <div class="status-pill">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Init...</span>
  </div>
</header>

<main>
  <!-- ÉCRAN PRINCIPAL -->
  <div id="login-screen" style="display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="card">
      <div class="card-section">
        <div class="section-label">🔐 NetChat Secure</div>
        <div class="field">
          <label class="fl">👤 Votre pseudo</label>
          <input type="text" id="pseudo-input" placeholder="Ex: Alice, Bob..." maxlength="20">
        </div>
      </div>

      <div class="card-section">
        <div class="section-label">📡 Mode de connexion</div>
        <div class="mode-selector">
          <div class="mode-btn" data-mode="code">🔢 Code seulement</div>
          <div class="mode-btn" data-mode="password">🔑 Mot de passe seulement</div>
          <div class="mode-btn" data-mode="both">🔐 Code + Mot de passe</div>
        </div>
      </div>

      <div id="code-mode-fields" class="card-section" style="display:none;">
        <div class="field">
          <label class="fl">🎫 Code de session</label>
          <input type="text" id="session-code" placeholder="Laissez vide pour en générer un" maxlength="10" style="text-transform:uppercase">
        </div>
      </div>

      <div id="password-mode-fields" class="card-section" style="display:none;">
        <div class="secret-wrap">
          <label class="fl">🔑 Mot de passe</label>
          <input type="password" id="session-password" placeholder="Entrez un mot de passe">
          <button class="toggle-eye" id="toggle-password-eye" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="create-btn">📡 Créer une session</button>
        <button class="btn btn-secondary" id="join-btn">🔗 Rejoindre</button>
      </div>
      <div id="login-error" class="error-msg"></div>
      <div id="login-info" class="info-msg" style="display:none;"></div>
    </div>
  </div>

  <!-- ÉCRAN D'ATTENTE -->
  <div id="wait-screen" style="display:none; align-items:center; justify-content:center; padding:20px;">
    <div class="card">
      <div class="card-section">
        <div class="section-label" id="wait-title">⏳ En attente...</div>
        <div id="wait-message" class="info-msg" style="margin-bottom:15px"></div>
        <div id="wait-code-display" class="code-display" style="display:none;"></div>
        <div id="wait-instruction" class="code-hint"></div>
      </div>
      <button class="btn-secondary" id="cancel-wait" style="width:100%; padding:10px; margin-top:10px;">✕ Annuler</button>
      <div id="wait-error" class="error-msg"></div>
    </div>
  </div>

  <!-- ÉCRAN DE CHAT -->
  <div id="chat-screen">
    <div class="chat-bar">
      <div class="peer-info">
        <div class="peer-name-display" id="peer-display">—</div>
        <div class="session-meta" id="session-meta"></div>
      </div>
      <div class="enc-badge">
        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Chiffré E2E
      </div>
      <button class="btn-disc" id="disconnect-btn">✕ Quitter</button>
    </div>
    <div id="messages"></div>
    <div class="input-bar">
      <textarea id="msg-input" placeholder="Message… (Entrée pour envoyer)" rows="1"></textarea>
      <button class="send-btn" id="send-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════════
// ÉTAT GLOBAL
// ═══════════════════════════════════════════════════════════════
var peer = null;
var conn = null;
var myName = '';
var peerName = '';
var currentMode = 'code'; // 'code', 'password', 'both'
var sessionCode = '';      // Pour les modes 'code' et 'both'
var sessionPassword = '';   // Pour les modes 'password' et 'both'
var myPeerId = '';
var targetPeerId = '';
var typingTimer = null;
var isTyping = false;
var typingEl = null;
var connTimeout = null;

// ═══════════════════════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════════════════════
var loginScreen = document.getElementById('login-screen');
var waitScreen = document.getElementById('wait-screen');
var pseudoInput = document.getElementById('pseudo-input');
var sessionCodeInput = document.getElementById('session-code');
var sessionPasswordInput = document.getElementById('session-password');
var createBtn = document.getElementById('create-btn');
var joinBtn = document.getElementById('join-btn');
var cancelWait = document.getElementById('cancel-wait');
var loginError = document.getElementById('login-error');
var loginInfo = document.getElementById('login-info');
var waitTitle = document.getElementById('wait-title');
var waitMessage = document.getElementById('wait-message');
var waitCodeDisplay = document.getElementById('wait-code-display');
var waitInstruction = document.getElementById('wait-instruction');
var waitError = document.getElementById('wait-error');
var statusDot = document.getElementById('status-dot');
var statusTextEl = document.getElementById('status-text');
var chatScreen = document.getElementById('chat-screen');
var messagesEl = document.getElementById('messages');
var msgInput = document.getElementById('msg-input');
var sendBtn = document.getElementById('send-btn');
var peerDisplay = document.getElementById('peer-display');
var sessionMeta = document.getElementById('session-meta');
var disconnBtn = document.getElementById('disconnect-btn');
var loadOverlay = document.getElementById('loading');
var loadTxt = document.getElementById('load-txt');

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function genRandomCode() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var code = '';
  for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function setStatus(state, label) {
  statusDot.className = 'dot' + (state ? ' ' + state : '');
  statusTextEl.textContent = label;
}

function showError(msg, element) {
  if (element) {
    element.textContent = msg;
    element.style.display = 'block';
  }
}

function hideError(element) {
  if (element) element.style.display = 'none';
}

function showLoading(msg) { loadTxt.textContent = msg; loadOverlay.style.display = 'flex'; }
function hideLoading() { loadOverlay.style.display = 'none'; }

function scrollBot() {
  requestAnimationFrame(function() { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════════
// CRYPTO - Génère la clé AES en fonction du mode
// ═══════════════════════════════════════════════════════════════
function getEncryptionKey() {
  if (currentMode === 'code') {
    // Clé dérivée du code de session
    return CryptoJS.SHA256(sessionCode + '_netchat_salt').toString();
  } else if (currentMode === 'password') {
    // Clé dérivée du mot de passe
    return CryptoJS.SHA256(sessionPassword).toString();
  } else {
    // Mode both : combinaison code + mot de passe
    return CryptoJS.SHA256(sessionCode + '_' + sessionPassword).toString();
  }
}

function aesEncrypt(text) {
  return CryptoJS.AES.encrypt(text, getEncryptionKey()).toString();
}

function aesDecrypt(cipher) {
  try {
    var bytes = CryptoJS.AES.decrypt(cipher, getEncryptionKey());
    var result = bytes.toString(CryptoJS.enc.Utf8);
    return result || null;
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════════════════
// MESSAGES UI
// ═══════════════════════════════════════════════════════════════
function addMsg(text, time, mine) {
  var w = document.createElement('div');
  w.className = 'msg-wrap ' + (mine ? 'mine' : 'theirs');
  w.innerHTML = '<div class="msg-bubble">' + esc(text) + '</div>' +
    '<div class="msg-meta">' + esc(mine ? 'Moi' : peerName) + ' · ' + esc(time) + '</div>';
  messagesEl.appendChild(w);
  scrollBot();
}

function addSystemMsg(text) {
  var el = document.createElement('div');
  el.className = 'system-msg';
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollBot();
}

function showTypingEl() {
  if (typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'typing-wrap';
  typingEl.innerHTML = '<div class="typing-indicator"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  messagesEl.appendChild(typingEl);
  scrollBot();
}

function removeTypingEl() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ═══════════════════════════════════════════════════════════════
// COMMUNICATION
// ═══════════════════════════════════════════════════════════════
function sendEnc(data) {
  if (!conn || !conn.open) return;
  conn.send({ enc: aesEncrypt(JSON.stringify(data)) });
}

function handleData(raw) {
  if (!raw || !raw.enc) return;
  var plain = aesDecrypt(raw.enc);
  if (!plain) {
    addSystemMsg('⚠ Erreur de déchiffrement - clé incorrecte');
    return;
  }
  var data;
  try { data = JSON.parse(plain); } catch(e) { return; }
  if (data.type === 'handshake') {
    peerName = data.name || 'Inconnu';
    onConnected();
  } else if (data.type === 'msg') {
    removeTypingEl();
    addMsg(data.text, data.time, false);
  } else if (data.type === 'typing') {
    showTypingEl();
  } else if (data.type === 'stop_typing') {
    removeTypingEl();
  } else if (data.type === 'bye') {
    handleDisconnect(true);
  }
}

function setupConn() {
  conn.on('open', function() {
    clearTimeout(connTimeout);
    hideLoading();
    sendEnc({ type: 'handshake', name: myName });
  });
  conn.on('data', handleData);
  conn.on('close', function() { handleDisconnect(true); });
  conn.on('error', function() { handleDisconnect(true); });
}

function onConnected() {
  setStatus('online', 'Connecté');
  waitScreen.style.display = 'none';
  chatScreen.style.display = 'flex';
  peerDisplay.textContent = peerName;
  var modeText = currentMode === 'code' ? '🔢 Code' : (currentMode === 'password' ? '🔑 Mot de passe' : '🔐 Code+Mot de passe');
  sessionMeta.textContent = modeText + ' · Chiffré AES-256';
  sendBtn.disabled = false;
  msgInput.focus();
  addSystemMsg('✓ Connecté avec ' + peerName);
}

// ═══════════════════════════════════════════════════════════════
// ENVOI DE MESSAGES
// ═══════════════════════════════════════════════════════════════
function sendMsg() {
  var text = msgInput.value.trim();
  if (!text || !conn || !conn.open) return;
  var time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  sendEnc({ type:'msg', text:text, time:time });
  addMsg(text, time, true);
  msgInput.value = '';
  msgInput.style.height = 'auto';
  stopSendTyping();
}

sendBtn.addEventListener('click', sendMsg);
msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
msgInput.addEventListener('input', function() {
  if (!conn || !conn.open) return;
  if (!isTyping) { isTyping = true; sendEnc({ type:'typing' }); }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopSendTyping, 1600);
});

function stopSendTyping() {
  if (isTyping && conn && conn.open) { isTyping = false; sendEnc({ type:'stop_typing' }); }
  clearTimeout(typingTimer);
}

// ═══════════════════════════════════════════════════════════════
// DÉCONNEXION
// ═══════════════════════════════════════════════════════════════
disconnBtn.addEventListener('click', function() {
  if (conn && conn.open) sendEnc({ type:'bye' });
  handleDisconnect(false);
});

function handleDisconnect(byPeer) {
  removeTypingEl();
  hideLoading();
  clearTimeout(connTimeout);
  if (chatScreen.style.display === 'flex') {
    addSystemMsg(byPeer ? '✕ ' + peerName + ' a quitté' : '✕ Vous avez quitté');
    setTimeout(function() {
      chatScreen.style.display = 'none';
      loginScreen.style.display = 'flex';
      waitScreen.style.display = 'none';
      messagesEl.innerHTML = '';
      sendBtn.disabled = true;
      if (conn) { conn.close(); conn = null; }
      if (peer) { peer.destroy(); peer = null; }
      setStatus('ready', 'Prêt');
    }, 1500);
  }
}

// ═══════════════════════════════════════════════════════════════
// CRÉER UNE SESSION
// ═══════════════════════════════════════════════════════════════
function createSession() {
  var pseudo = pseudoInput.value.trim();
  if (!pseudo) { showError('⚠ Entrez un pseudo', loginError); return; }
  
  if (currentMode === 'code') {
    sessionCode = sessionCodeInput.value.trim().toUpperCase();
    if (!sessionCode) sessionCode = genRandomCode();
  } else if (currentMode === 'password') {
    sessionPassword = sessionPasswordInput.value;
    if (!sessionPassword) { showError('⚠ Entrez un mot de passe', loginError); return; }
  } else {
    sessionCode = sessionCodeInput.value.trim().toUpperCase();
    sessionPassword = sessionPasswordInput.value;
    if (!sessionCode) sessionCode = genRandomCode();
    if (!sessionPassword) { showError('⚠ Entrez un mot de passe', loginError); return; }
  }
  
  myName = pseudo;
  hideError(loginError);
  showLoading('Création de la session...');
  
  myPeerId = genRandomCode() + Math.random().toString(36).substring(2, 5);
  
  if (peer) peer.destroy();
  peer = new Peer(myPeerId, { host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 0 });
  
  peer.on('open', function(id) {
    hideLoading();
    loginScreen.style.display = 'none';
    waitScreen.style.display = 'flex';
    waitTitle.textContent = '⏳ En attente d\'un pair...';
    
    var infoText = '';
    if (currentMode === 'code') {
      infoText = '🔢 Code de session : <strong>' + sessionCode + '</strong>';
      waitCodeDisplay.style.display = 'block';
      waitCodeDisplay.innerHTML = sessionCode;
    } else if (currentMode === 'password') {
      infoText = '🔑 Mot de passe : <strong>' + '•'.repeat(sessionPassword.length) + '</strong>';
      waitCodeDisplay.style.display = 'none';
    } else {
      infoText = '🔢 Code : <strong>' + sessionCode + '</strong><br>🔑 Mot de passe : <strong>' + '•'.repeat(sessionPassword.length) + '</strong>';
      waitCodeDisplay.style.display = 'block';
      waitCodeDisplay.innerHTML = sessionCode;
    }
    
    waitMessage.innerHTML = '📋 À partager avec votre pair :<br>' + infoText;
    waitInstruction.innerHTML = 'Votre ami doit utiliser le bouton "Rejoindre" avec les mêmes informations.';
    setStatus('ready', 'En attente');
    
    peer.on('connection', function(incoming) {
      if (conn) { incoming.close(); return; }
      conn = incoming;
      setStatus('connecting', 'Connexion...');
      showLoading('Connexion établie...');
      setupConn();
    });
  });
  
  peer.on('error', function(err) {
    hideLoading();
    console.error(err);
    showError('Erreur: ' + (err.type || 'Connexion impossible'), loginError);
    setTimeout(function() { loginScreen.style.display = 'flex'; waitScreen.style.display = 'none'; }, 2000);
  });
}

// ═══════════════════════════════════════════════════════════════
// REJOINDRE UNE SESSION
// ═══════════════════════════════════════════════════════════════
function joinSession() {
  var pseudo = pseudoInput.value.trim();
  if (!pseudo) { showError('⚠ Entrez un pseudo', loginError); return; }
  
  if (currentMode === 'code') {
    sessionCode = sessionCodeInput.value.trim().toUpperCase();
    if (!sessionCode) { showError('⚠ Entrez le code de session du pair', loginError); return; }
  } else if (currentMode === 'password') {
    sessionPassword = sessionPasswordInput.value;
    if (!sessionPassword) { showError('⚠ Entrez le mot de passe du pair', loginError); return; }
  } else {
    sessionCode = sessionCodeInput.value.trim().toUpperCase();
    sessionPassword = sessionPasswordInput.value;
    if (!sessionCode) { showError('⚠ Entrez le code de session du pair', loginError); return; }
    if (!sessionPassword) { showError('⚠ Entrez le mot de passe du pair', loginError); return; }
  }
  
  myName = pseudo;
  hideError(loginError);
  showLoading('Connexion à la session...');
  
  var randomId = genRandomCode() + Math.random().toString(36).substring(2, 5);
  targetPeerId = sessionCode; // En mode code, le code est l'ID Peer
  
  if (peer) peer.destroy();
  peer = new Peer(randomId, { host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 0 });
  
  peer.on('open', function(id) {
    conn = peer.connect(targetPeerId, { reliable: true, serialization: 'json' });
    setupConn();
    
    connTimeout = setTimeout(function() {
      if (!conn || !conn.open) {
        conn = null;
        hideLoading();
        setStatus('ready', 'Prêt');
        showError('❌ Impossible de rejoindre : code invalide ou salle inexistante', loginError);
        setTimeout(function() { loginScreen.style.display = 'flex'; waitScreen.style.display = 'none'; }, 2000);
      }
    }, 10000);
    
    loginScreen.style.display = 'none';
    waitScreen.style.display = 'flex';
    waitTitle.textContent = '⏳ Connexion en cours...';
    waitMessage.innerHTML = '🔗 Connexion à la session...';
    waitCodeDisplay.style.display = 'none';
    waitInstruction.innerHTML = 'En attente de la réponse du pair...';
    setStatus('connecting', 'Connexion...');
  });
  
  peer.on('error', function(err) {
    hideLoading();
    console.error(err);
    showError('Erreur: ' + (err.type || 'Connexion impossible'), loginError);
    setTimeout(function() { loginScreen.style.display = 'flex'; waitScreen.style.display = 'none'; }, 2000);
  });
}

// ═══════════════════════════════════════════════════════════════
// MODE DE CONNEXION
// ═══════════════════════════════════════════════════════════════
var modeBtns = document.querySelectorAll('.mode-btn');
modeBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    modeBtns.forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentMode = btn.getAttribute('data-mode');
    
    var codeFields = document.getElementById('code-mode-fields');
    var passwordFields = document.getElementById('password-mode-fields');
    
    if (currentMode === 'code') {
      codeFields.style.display = 'block';
      passwordFields.style.display = 'none';
      loginInfo.style.display = 'block';
      loginInfo.innerHTML = '🔢 Mode Code : Entrez un code ou laissez vide pour en générer un.';
    } else if (currentMode === 'password') {
      codeFields.style.display = 'none';
      passwordFields.style.display = 'block';
      loginInfo.style.display = 'block';
      loginInfo.innerHTML = '🔑 Mode Mot de passe : Utilisez le même mot de passe que votre pair.';
    } else {
      codeFields.style.display = 'block';
      passwordFields.style.display = 'block';
      loginInfo.style.display = 'block';
      loginInfo.innerHTML = '🔐 Mode Sécurisé : Le pair doit avoir le même code ET le même mot de passe.';
    }
  });
});

// Activer le mode code par défaut
document.querySelector('.mode-btn[data-mode="code"]').click();

// ═══════════════════════════════════════════════════════════════
// BOUTONS
// ═══════════════════════════════════════════════════════════════
createBtn.addEventListener('click', createSession);
joinBtn.addEventListener('click', joinSession);
cancelWait.addEventListener('click', function() {
  if (peer) { peer.destroy(); peer = null; }
  if (conn) { conn.close(); conn = null; }
  waitScreen.style.display = 'none';
  loginScreen.style.display = 'flex';
  setStatus('ready', 'Prêt');
});

// ═══════════════════════════════════════════════════════════════
// TOGGLE PASSWORD
// ═══════════════════════════════════════════════════════════════
var togglePasswordEye = document.getElementById('toggle-password-eye');
var passwordEyeIcon = togglePasswordEye.querySelector('svg');
togglePasswordEye.addEventListener('click', function() {
  var isPass = sessionPasswordInput.type === 'password';
  sessionPasswordInput.type = isPass ? 'text' : 'password';
  passwordEyeIcon.innerHTML = isPass
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
});

// Auto-resize
msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

setStatus('ready', 'Prêt');
</script>
