<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetChat Secure - Chat Sécurisé</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg-dark: #0a0e17;
    --bg-light: #ffffff;
    --surface-dark: #111827;
    --surface-light: #f9fafb;
    --surface2-dark: #1f2937;
    --surface2-light: #f3f4f6;
    --border-dark: #374151;
    --border-light: #e5e7eb;
    --accent: #06b6d4;
    --accent-dim: rgba(6,182,212,0.1);
    --accent-glow: rgba(6,182,212,0.25);
    --text-dark: #f0f9ff;
    --text-light: #1f2937;
    --muted-dark: #9ca3af;
    --muted-light: #6b7280;
    --danger: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
    --my-bg-dark: #0f4c3c;
    --my-border-dark: rgba(16,185,129,0.2);
    --their-bg-dark: #1e3a5f;
    --their-border-dark: rgba(6,182,212,0.2);
    --my-bg-light: #ecfdf5;
    --my-border-light: rgba(16,185,129,0.3);
    --their-bg-light: #eff6ff;
    --their-border-light: rgba(6,182,212,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html {
    --bg: var(--bg-dark);
    --surface: var(--surface-dark);
    --surface2: var(--surface2-dark);
    --border: var(--border-dark);
    --text: var(--text-dark);
    --muted: var(--muted-dark);
    --my-bg: var(--my-bg-dark);
    --my-border: var(--my-border-dark);
    --their-bg: var(--their-bg-dark);
    --their-border: var(--their-border-dark);
  }

  html.light-mode {
    --bg: var(--bg-light);
    --surface: var(--surface-light);
    --surface2: var(--surface2-light);
    --border: var(--border-light);
    --text: var(--text-light);
    --muted: var(--muted-light);
    --my-bg: var(--my-bg-light);
    --my-border: var(--my-border-light);
    --their-bg: var(--their-bg-light);
    --their-border: var(--their-border-light);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.3s ease, color 0.3s ease;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(6,182,212,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(59,130,246,0.03) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }

  header {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    background:rgba(10,14,23,0.95);
    backdrop-filter:blur(12px);
    flex-shrink:0;
    transition: background 0.3s ease;
  }

  html.light-mode header {
    background:rgba(255,255,255,0.95);
  }

  .logo {
    font-family:'JetBrains Mono',monospace;
    font-size:14px; font-weight:700;
    letter-spacing:0.05em;
    color:var(--accent);
    display:flex; align-items:center; gap:8px;
  }

  .logo-icon {
    width:24px; height:24px;
    display:flex; align-items:center; justify-content:center;
    background:var(--accent-dim);
    border-radius:6px;
    font-size:12px;
  }

  .header-controls {
    display:flex; align-items:center; gap:12px;
  }

  .theme-toggle {
    background:var(--surface2);
    border:none;
    border-radius:8px;
    width:40px; height:40px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted);
    transition:all 0.2s;
    font-size:18px;
  }

  .theme-toggle:hover {
    background:var(--border);
    color:var(--accent);
  }

  .status-pill {
    display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px; letter-spacing:0.05em;
    color:var(--muted);
    text-transform:uppercase;
    padding:6px 12px;
    background:var(--surface2);
    border-radius:20px;
  }

  .dot { width:6px; height:6px; border-radius:50%; background:var(--muted); transition:all 0.3s; }
  .dot.online     { background:var(--success); box-shadow:0 0 8px rgba(16,185,129,0.5); animation:pulse 2s infinite; }
  .dot.connecting { background:var(--warning); animation:blink 0.7s infinite; }
  .dot.error      { background:var(--danger); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  main { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; z-index:1; }

  #login-screen, #wait-screen {
    flex:1; display:flex; align-items:center; justify-content:center; padding:20px; overflow-y:auto;
  }

  .card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:36px;
    width:100%; max-width:420px;
    position:relative;
    animation: fadeInUp 0.4s ease;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
  }

  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
  }

  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:16px 16px 0 0;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .card-section { margin-bottom:28px; }
  .card-section:last-child { margin-bottom:0; }

  .section-label {
    font-family:'JetBrains Mono',monospace;
    font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted);
    margin-bottom:14px; display:flex; align-items:center; gap:8px; font-weight:600;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .field { margin-bottom:14px; }

  label.fl {
    display:block; font-family:'JetBrains Mono',monospace;
    font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; font-weight:500;
  }

  input[type="text"], input[type="password"] {
    width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; font-family:'Inter',sans-serif; font-size:14px; color:var(--text);
    outline:none; transition:all 0.2s;
  }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }

  .secret-wrap { position:relative; }
  .secret-wrap input { padding-right:44px; }
  .toggle-eye {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer; color:var(--muted); padding:4px;
    transition:all 0.2s; font-size:16px;
  }
  .toggle-eye:hover { color:var(--accent); }

  .btn {
    width:100%; padding:12px; border:none; border-radius:10px;
    font-family:'Inter',sans-serif; font-size:14px; letter-spacing:0.02em;
    text-transform:uppercase; cursor:pointer; transition:all 0.2s; font-weight:600;
  }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-primary:hover:not(:disabled) { box-shadow:0 0 20px var(--accent-glow); transform:translateY(-2px); }
  .btn-primary:active { transform:translateY(0); }
  .btn:disabled { opacity:0.35; cursor:not-allowed; transform:none !important; }

  .btn-secondary {
    background:var(--surface2);
    color:var(--accent);
    border:1px solid var(--accent);
    margin-top:10px;
  }

  .btn-secondary:hover:not(:disabled) {
    background:var(--accent);
    color:#000;
  }

  .error-msg {
    font-size:13px; color:var(--danger); font-family:'Inter',sans-serif;
    margin-top:10px; display:none; padding:12px 14px;
    background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); border-radius:8px;
  }

  .info-msg {
    font-size:12px; color:var(--accent); font-family:'Inter',sans-serif;
    margin-top:10px; padding:12px 14px;
    background:var(--accent-dim); border:1px solid var(--accent);
    border-radius:8px; text-align:center;
  }

  #chat-screen { display:none; flex:1; flex-direction:column; overflow:hidden; }

  .chat-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; gap:10px;
  }

  .peer-info { display:flex; flex-direction:column; min-width:0; flex:1; }
  .peer-name-display { font-weight:600; font-size:14px; color:var(--accent); }
  
  .session-meta { 
    font-family:'JetBrains Mono',monospace; 
    font-size:10px; color:var(--muted); 
    letter-spacing:0.05em; margin-top:2px;
    display:flex; gap:12px; flex-wrap:wrap;
  }

  .network-stat {
    display:flex; align-items:center; gap:4px;
    padding:2px 8px;
    background:var(--surface2);
    border-radius:4px;
    font-size:9px;
  }

  .network-stat.good { color:var(--success); }
  .network-stat.warning { color:var(--warning); }
  .network-stat.bad { color:var(--danger); }

  .enc-badge {
    display:flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace;
    font-size:10px; letter-spacing:0.05em; color:var(--accent);
    background:var(--accent-dim); border:1px solid var(--accent);
    border-radius:20px; padding:4px 12px; white-space:nowrap; flex-shrink:0;
  }

  .btn-disc {
    background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px;
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.05em; color:var(--muted);
    cursor:pointer; text-transform:uppercase; transition:all 0.2s; flex-shrink:0;
  }
  .btn-disc:hover { border-color:var(--danger); color:var(--danger); }

  #messages {
    flex:1; overflow-y:auto; padding:16px;
    display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth;
  }
  #messages::-webkit-scrollbar { width:6px; }
  #messages::-webkit-scrollbar-track { background:transparent; }
  #messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  .msg-wrap { display:flex; flex-direction:column; max-width:70%; animation:slideIn 0.2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  .msg-wrap.mine   { align-self:flex-end; align-items:flex-end; }
  .msg-wrap.theirs { align-self:flex-start; align-items:flex-start; }

  .msg-container {
    display:flex; gap:4px; align-items:flex-end;
  }

  .msg-wrap.mine .msg-container { flex-direction: row-reverse; }

  .msg-bubble {
    padding:10px 14px; border-radius:12px;
    font-size:14px; line-height:1.5; word-break:break-word; white-space:pre-wrap;
    position:relative;
  }
  .msg-wrap.mine   .msg-bubble { background:var(--my-bg); border:1px solid var(--my-border); border-bottom-right-radius:2px; }
  .msg-wrap.theirs .msg-bubble { background:var(--their-bg); border:1px solid var(--their-border); border-bottom-left-radius:2px; }

  .msg-status {
    font-size:10px; color:var(--muted); min-width:16px; text-align:center;
  }

  .msg-meta { 
    font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); 
    margin-top:4px; letter-spacing:0.05em;
    display:flex; gap:6px; align-items:center;
  }

  .system-msg {
    text-align:center; font-family:'JetBrains Mono',monospace; font-size:11px;
    color:var(--muted); letter-spacing:0.05em; padding:8px 0;
    display:flex; align-items:center; gap:8px;
  }
  .system-msg::before,.system-msg::after { content:''; flex:1; height:1px; background:var(--border); }

  .typing-wrap { align-self:flex-start; animation:slideIn 0.2s ease; }
  .typing-indicator {
    display:flex; align-items:center; gap:4px; padding:10px 14px;
    background:var(--their-bg); border:1px solid var(--their-border);
    border-radius:12px; border-bottom-left-radius:2px;
  }
  .td { width:4px; height:4px; border-radius:50%; background:var(--muted); animation:tb 1.4s infinite; }
  .td:nth-child(2){animation-delay:0.2s} .td:nth-child(3){animation-delay:0.4s}
  @keyframes tb { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .input-bar {
    display:flex; gap:8px; padding:12px 14px;
    border-top:1px solid var(--border); background:var(--surface);
    flex-shrink:0; align-items:flex-end;
  }

  .input-wrapper {
    flex:1; display:flex; gap:6px; align-items:flex-end;
  }

  #msg-input {
    flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:10px;
    padding:10px 12px; font-family:'Inter',sans-serif; font-size:14px; color:var(--text);
    outline:none; resize:none; max-height:100px; line-height:1.5;
    transition:all 0.2s;
  }
  #msg-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }

  .emoji-btn, .send-btn {
    background:var(--surface2); border:1px solid var(--border); border-radius:8px;
    width:40px; height:40px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; color:var(--muted); font-size:16px; flex-shrink:0;
  }

  .emoji-btn:hover, .send-btn:hover {
    background:var(--accent);
    color:#000;
    border-color:var(--accent);
  }

  .send-btn {
    background:var(--accent);
    border:none;
    color:#000;
  }

  .send-btn:disabled { 
    opacity:0.35; 
    cursor:not-allowed; 
    background:var(--border);
    color:var(--muted);
  }

  .emoji-picker {
    position:absolute;
    bottom:60px;
    right:14px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px;
    display:none;
    z-index:1000;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    max-width:280px;
  }

  .emoji-picker.show { display:grid; }

  .emoji-picker {
    grid-template-columns:repeat(6, 1fr);
    gap:8px;
  }

  .emoji-item {
    width:40px;
    height:40px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--surface2);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    transition:all 0.2s;
  }

  .emoji-item:hover {
    background:var(--accent);
    border-color:var(--accent);
    transform:scale(1.1);
  }

  #loading {
    display:none; position:fixed; inset:0;
    background:rgba(10,14,23,0.95); z-index:100;
    align-items:center; justify-content:center; flex-direction:column; gap:14px;
    backdrop-filter:blur(8px);
  }

  .spinner { 
    width:40px; height:40px; 
    border:3px solid var(--border); 
    border-top-color:var(--accent); 
    border-radius:50%; 
    animation:spin 0.8s linear infinite; 
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .load-txt { 
    font-family:'JetBrains Mono',monospace; 
    font-size:12px; 
    letter-spacing:0.1em; 
    color:var(--muted); 
    text-transform:uppercase; 
  }

  .btn-back {
    background:none; border:1px solid var(--border); border-radius:8px; padding:8px 14px;
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.05em; color:var(--muted);
    cursor:pointer; transition:all 0.2s; margin-top:12px; width:auto;
  }
  .btn-back:hover { border-color:var(--accent); color:var(--accent); }

  .room-code-display {
    font-size:28px;
    font-weight:700;
    letter-spacing:2px;
    background:var(--surface2);
    padding:18px;
    border-radius:12px;
    text-align:center;
    margin:12px 0;
    font-family:'JetBrains Mono',monospace;
    color:var(--accent);
    word-break:break-all;
    border:1px solid var(--border);
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="load-txt" id="load-txt">Initialisation...</div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">🔐</div>
    NetChat Secure
  </div>
  <div class="header-controls">
    <button class="theme-toggle" id="theme-toggle" title="Basculer le mode sombre/clair">
      <i class="fas fa-moon"></i>
    </button>
    <div class="status-pill">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Prêt</span>
    </div>
  </div>
</header>

<main>
  <div id="login-screen">
    <div class="card">
      <div class="card-section">
        <div class="section-label">🔐 Connexion sécurisée</div>
        <div class="field">
          <label class="fl">👤 Votre pseudo</label>
          <input type="text" id="login-pseudo" placeholder="Alice, Bob..." maxlength="20" autocomplete="off">
        </div>
      </div>

      <div class="card-section">
        <div class="section-label">🔑 Mot de passe de la salle</div>
        <div class="secret-wrap">
          <input type="password" id="room-password" placeholder="Entrez un mot de passe" autocomplete="off">
          <button class="toggle-eye" id="toggle-eye" type="button">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="info-msg">
          💡 Utilisez le même mot de passe que votre ami pour chatter
        </div>
      </div>

      <button class="btn btn-primary" id="create-room-btn"><i class="fas fa-plus"></i> Créer une salle</button>
      <button class="btn btn-secondary" id="join-room-btn"><i class="fas fa-link"></i> Rejoindre une salle</button>
      <div id="login-error" class="error-msg"></div>
    </div>
  </div>

  <div id="wait-screen" style="display:none">
    <div class="card">
      <div class="card-section">
        <div class="section-label" id="wait-title">⏳ En attente...</div>
        <div id="wait-message" class="info-msg" style="margin-bottom:15px">
          🔓 Partage le mot de passe :
        </div>
        <div class="room-code-display" id="invite-code"></div>
        <div id="wait-instruction" class="code-hint" style="margin-top:10px; text-align:center; font-size:13px; color:var(--muted);"></div>
      </div>
      <button class="btn-back" id="cancel-wait" style="width:100%; margin-top:10px;"><i class="fas fa-times"></i> Annuler</button>
      <div id="wait-error" class="error-msg"></div>
    </div>
  </div>

  <div id="chat-screen">
    <div class="chat-bar">
      <div class="peer-info">
        <div class="peer-name-display" id="peer-display">—</div>
        <div class="session-meta">
          Salle : <span id="room-name">••••••</span>
          <span class="network-stat good" id="network-stat">
            <i class="fas fa-wifi"></i>
            <span id="latency">—</span> ms
          </span>
        </div>
      </div>
      <div class="enc-badge">
        <i class="fas fa-lock"></i>
        E2E AES-256
      </div>
      <button class="btn-disc" id="disconnect-btn"><i class="fas fa-sign-out-alt"></i> Quitter</button>
    </div>

    <div id="messages"></div>

    <div class="input-bar">
      <div class="input-wrapper">
        <textarea id="msg-input" placeholder="Message..." rows="1"></textarea>
        <button class="emoji-btn" id="emoji-btn" title="Ajouter un emoji">
          <i class="fas fa-smile"></i>
        </button>
      </div>
      <button class="send-btn" id="send-btn" disabled title="Envoyer (Entrée)">
        <i class="fas fa-paper-plane"></i>
      </button>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>
  </div>
</main>

<script>
// EMOJIS
const EMOJIS = ['😀','😂','😍','🥰','😘','😎','🤔','😅','🎉','🔥','💯','⭐','❤️','👍','✌️','🙌','🤝','👏','💪','🎯','🚀','🌟','✨','💫','🎈','🎁','🎊','🌈','☀️','🌙','⚡','🍕','🍔','🍟','🍗','🍰','🍪','☕','🍷','🍺','🍻','🎂','🍎','🍊','🍋','🍌','🍉'];

// STATE
var peer = null;
var conn = null;
var myName = '';
var peerName = '';
var roomPassword = '';
var myId = '';
var targetId = '';
var typingTimer = null;
var isTyping = false;
var typingEl = null;
var connTimeout = null;
var messageStates = {};
var latencyValues = [];
var latencyCheckInterval = null;

// DOM
var loginScreen = document.getElementById('login-screen');
var waitScreen = document.getElementById('wait-screen');
var loginPseudo = document.getElementById('login-pseudo');
var roomPasswordInput = document.getElementById('room-password');
var createRoomBtn = document.getElementById('create-room-btn');
var joinRoomBtn = document.getElementById('join-room-btn');
var toggleEye = document.getElementById('toggle-eye');
var cancelWait = document.getElementById('cancel-wait');
var inviteCodeSpan = document.getElementById('invite-code');
var waitTitle = document.getElementById('wait-title');
var waitMessage = document.getElementById('wait-message');
var waitInstruction = document.getElementById('wait-instruction');

var statusDot = document.getElementById('status-dot');
var statusTextEl = document.getElementById('status-text');
var chatScreen = document.getElementById('chat-screen');
var messagesEl = document.getElementById('messages');
var msgInput = document.getElementById('msg-input');
var sendBtn = document.getElementById('send-btn');
var peerDisplay = document.getElementById('peer-display');
var roomNameSpan = document.getElementById('room-name');
var disconnBtn = document.getElementById('disconnect-btn');
var loadOverlay = document.getElementById('loading');
var loadTxt = document.getElementById('load-txt');
var waitError = document.getElementById('wait-error');
var loginError = document.getElementById('login-error');
var themeToggle = document.getElementById('theme-toggle');
var emojiBtn = document.getElementById('emoji-btn');
var emojiPicker = document.getElementById('emoji-picker');
var latencyEl = document.getElementById('latency');
var networkStatEl = document.getElementById('network-stat');

// UTILS
function genRandomId() {
  return Math.random().toString(36).substring(2, 10).toUpperCase();
}

function setStatus(state, label) {
  statusDot.className = 'dot' + (state ? ' ' + state : '');
  statusTextEl.textContent = label;
}

function showError(msg, element) {
  if (element) {
    element.textContent = msg;
    element.style.display = 'block';
  }
}

function hideError(element) {
  if (element) element.style.display = 'none';
}

function showLoading(msg) { loadTxt.textContent = msg; loadOverlay.style.display = 'flex'; }
function hideLoading() { loadOverlay.style.display = 'none'; }

function scrollBot() {
  requestAnimationFrame(function() { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// NETWORK MONITORING
function startLatencyMonitoring() {
  if (latencyCheckInterval) clearInterval(latencyCheckInterval);
  
  latencyCheckInterval = setInterval(() => {
    if (conn && conn.open) {
      var startTime = Date.now();
      sendEnc({ type: 'ping', timestamp: startTime });
    }
  }, 3000);
}

function stopLatencyMonitoring() {
  if (latencyCheckInterval) {
    clearInterval(latencyCheckInterval);
    latencyCheckInterval = null;
  }
}

function updateLatencyDisplay(latency) {
  latencyValues.push(latency);
  if (latencyValues.length > 5) latencyValues.shift();
  
  const avgLatency = Math.round(latencyValues.reduce((a, b) => a + b, 0) / latencyValues.length);
  latencyEl.textContent = avgLatency;
  
  // Color based on quality
  if (avgLatency < 50) {
    networkStatEl.className = 'network-stat good';
  } else if (avgLatency < 150) {
    networkStatEl.className = 'network-stat warning';
  } else {
    networkStatEl.className = 'network-stat bad';
  }
}

// THEME TOGGLE
function toggleTheme() {
  const html = document.documentElement;
  html.classList.toggle('light-mode');
  localStorage.setItem('theme', html.classList.contains('light-mode') ? 'light' : 'dark');
  updateThemeIcon();
}

function updateThemeIcon() {
  const icon = themeToggle.querySelector('i');
  const isDark = !document.documentElement.classList.contains('light-mode');
  icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
}

function initTheme() {
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'light') {
    document.documentElement.classList.add('light-mode');
  }
  updateThemeIcon();
}

themeToggle.addEventListener('click', toggleTheme);

// EMOJI PICKER
function initEmojiPicker() {
  EMOJIS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.className = 'emoji-item';
    btn.textContent = emoji;
    btn.onclick = (e) => {
      e.preventDefault();
      msgInput.value += emoji;
      msgInput.focus();
      emojiPicker.classList.remove('show');
    };
    emojiPicker.appendChild(btn);
  });
}

emojiBtn.addEventListener('click', () => {
  emojiPicker.classList.toggle('show');
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.emoji-btn') && !e.target.closest('.emoji-picker')) {
    emojiPicker.classList.remove('show');
  }
});

initEmojiPicker();

// CRYPTO
function getEncryptionKey() {
  return CryptoJS.SHA256(roomPassword).toString();
}

function aesEncrypt(text) {
  return CryptoJS.AES.encrypt(text, getEncryptionKey()).toString();
}

function aesDecrypt(cipher) {
  try {
    var bytes = CryptoJS.AES.decrypt(cipher, getEncryptionKey());
    var result = bytes.toString(CryptoJS.enc.Utf8);
    return result || null;
  } catch(e) { return null; }
}

// MESSAGES UI
function addMsg(text, time, mine, id, status = 'sent') {
  var w = document.createElement('div');
  w.className = 'msg-wrap ' + (mine ? 'mine' : 'theirs');
  w.id = 'msg-' + id;
  
  const statusIcon = mine ? getStatusIcon(status) : '';
  
  w.innerHTML = `
    <div class="msg-container">
      <div class="msg-bubble">${esc(text)}</div>
      ${mine ? `<div class="msg-status">${statusIcon}</div>` : ''}
    </div>
    <div class="msg-meta">
      ${mine ? `${esc('Moi')}` : esc(peerName)}
      <span>·</span>
      ${esc(time)}
    </div>
  `;
  messagesEl.appendChild(w);
  scrollBot();
  messageStates[id] = status;
}

function getStatusIcon(status) {
  switch(status) {
    case 'pending': return '⏱️';
    case 'sent': return '✓';
    case 'delivered': return '✓✓';
    case 'read': return '✓✓';
    default: return '';
  }
}

function updateMsgStatus(id, status) {
  messageStates[id] = status;
  const msgEl = document.getElementById('msg-' + id);
  if (msgEl) {
    const statusEl = msgEl.querySelector('.msg-status');
    if (statusEl) {
      statusEl.textContent = getStatusIcon(status);
    }
  }
}

function addSystemMsg(text) {
  var el = document.createElement('div');
  el.className = 'system-msg';
  el.textContent = text;
  messagesEl.appendChild(el);
  scrollBot();
}

function showTypingEl() {
  if (typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'typing-wrap';
  typingEl.innerHTML = '<div class="typing-indicator"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  messagesEl.appendChild(typingEl);
  scrollBot();
}

function removeTypingEl() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// SEND
function sendEnc(data) {
  if (!conn || !conn.open) return;
  conn.send({ enc: aesEncrypt(JSON.stringify(data)) });
}

// HANDLE DATA
function handleData(raw) {
  if (!raw || !raw.enc) return;
  var plain = aesDecrypt(raw.enc);
  if (!plain) {
    addSystemMsg('⚠ Erreur de déchiffrement - mot de passe incorrect ?');
    return;
  }
  var data;
  try { data = JSON.parse(plain); } catch(e) { return; }
  
  if (data.type === 'handshake') {
    peerName = data.name || 'Inconnu';
    onConnected();
  } else if (data.type === 'msg') {
    removeTypingEl();
    addMsg(data.text, data.time, false, data.id || Date.now());
    sendEnc({ type: 'msg_delivered', id: data.id });
  } else if (data.type === 'msg_delivered') {
    updateMsgStatus(data.id, 'delivered');
  } else if (data.type === 'msg_read') {
    updateMsgStatus(data.id, 'read');
  } else if (data.type === 'ping') {
    sendEnc({ type: 'pong', timestamp: data.timestamp });
  } else if (data.type === 'pong') {
    var latency = Date.now() - data.timestamp;
    updateLatencyDisplay(latency);
  } else if (data.type === 'typing') {
    showTypingEl();
  } else if (data.type === 'stop_typing') {
    removeTypingEl();
  } else if (data.type === 'bye') {
    handleDisconnect(true);
  }
}

// SETUP CONNECTION
function setupConn() {
  conn.on('open', function() {
    clearTimeout(connTimeout);
    hideLoading();
    sendEnc({ type: 'handshake', name: myName });
    startLatencyMonitoring();
  });
  conn.on('data', handleData);
  conn.on('close', function() { handleDisconnect(true); });
  conn.on('error', function() { handleDisconnect(true); });
}

function onConnected() {
  setStatus('online', 'Connecté');
  waitScreen.style.display = 'none';
  chatScreen.style.display = 'flex';
  peerDisplay.textContent = peerName;
  roomNameSpan.textContent = '••••••';
  sendBtn.disabled = false;
  msgInput.focus();
  addSystemMsg('✓ Connecté avec ' + peerName);
}

// SEND MESSAGE
function sendMsg() {
  var text = msgInput.value.trim();
  if (!text || !conn || !conn.open) return;
  
  var time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  var msgId = Date.now();
  
  sendEnc({ type:'msg', text:text, time:time, id: msgId });
  addMsg(text, time, true, msgId, 'pending');
  msgInput.value = '';
  msgInput.style.height = 'auto';
  stopSendTyping();
  
  setTimeout(() => updateMsgStatus(msgId, 'sent'), 100);
}

messagesEl.addEventListener('scroll', () => {
  const lastMsg = messagesEl.lastElementChild;
  if (lastMsg && lastMsg.classList.contains('msg-wrap') && lastMsg.classList.contains('theirs')) {
    const rect = lastMsg.getBoundingClientRect();
    if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
      sendEnc({ type: 'msg_read' });
    }
  }
});

sendBtn.addEventListener('click', sendMsg);
msgInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
msgInput.addEventListener('input', function() {
  if (!conn || !conn.open) return;
  if (!isTyping) { isTyping = true; sendEnc({ type:'typing' }); }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(stopSendTyping, 1600);
});

function stopSendTyping() {
  if (isTyping && conn && conn.open) { isTyping = false; sendEnc({ type:'stop_typing' }); }
  clearTimeout(typingTimer);
}

// DISCONNECT
disconnBtn.addEventListener('click', function() {
  if (conn && conn.open) sendEnc({ type:'bye' });
  handleDisconnect(false);
});

function handleDisconnect(byPeer) {
  removeTypingEl();
  hideLoading();
  stopLatencyMonitoring();
  clearTimeout(connTimeout);
  if (chatScreen.style.display === 'flex') {
    addSystemMsg(byPeer ? '✕ ' + peerName + ' a quitté' : '✕ Vous avez quitté');
    setTimeout(function() {
      chatScreen.style.display = 'none';
      loginScreen.style.display = 'flex';
      waitScreen.style.display = 'none';
      messagesEl.innerHTML = '';
      sendBtn.disabled = true;
      if (conn) { conn.close(); conn = null; }
      if (peer) { peer.destroy(); peer = null; }
      setStatus('ready', 'Prêt');
      messageStates = {};
      latencyValues = [];
      latencyEl.textContent = '—';
    }, 1500);
  }
}

// CREATE ROOM
function createRoom() {
  var pseudo = loginPseudo.value.trim();
  var password = roomPasswordInput.value;
  if (!pseudo) { showError('⚠ Entrez un pseudo', loginError); return; }
  if (!password) { showError('⚠ Entrez un mot de passe', loginError); return; }
  hideError(loginError);
  myName = pseudo;
  roomPassword = password;
  
  myId = CryptoJS.SHA256(password).toString().substring(0, 12).toUpperCase();
  targetId = null;
  
  showLoading('Création de la salle...');
  if (peer) { peer.destroy(); }
  peer = new Peer(myId, { host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 0 });
  peer.on('open', function(id) {
    hideLoading();
    loginScreen.style.display = 'none';
    waitScreen.style.display = 'flex';
    waitTitle.textContent = '⏳ En attente...';
    waitMessage.innerHTML = '🔓 Partage le mot de passe :';
    inviteCodeSpan.textContent = password;
    waitInstruction.innerHTML = 'Votre ami doit cliquer sur "Rejoindre une salle" et entrer le même mot de passe.';
    setStatus('ready', 'En attente');
    peer.on('connection', function(incoming) {
      if (conn) { incoming.close(); return; }
      conn = incoming;
      setStatus('connecting', 'Connexion...');
      showLoading('Connexion établie...');
      setupConn();
    });
  });
  peer.on('error', function(err) {
    hideLoading();
    console.error(err);
    showError('Erreur: ' + (err.type || 'Connexion impossible'), loginError);
    setTimeout(function() { loginScreen.style.display = 'flex'; waitScreen.style.display = 'none'; }, 2000);
  });
}

// JOIN ROOM
function joinRoom() {
  var pseudo = loginPseudo.value.trim();
  var password = roomPasswordInput.value;
  if (!pseudo) { showError('⚠ Entrez un pseudo', loginError); return; }
  if (!password) { showError('⚠ Entrez un mot de passe', loginError); return; }
  
  myName = pseudo;
  roomPassword = password;
  
  targetId = CryptoJS.SHA256(password).toString().substring(0, 12).toUpperCase();
  
  showLoading('Connexion à la salle...');
  if (peer) { peer.destroy(); }
  var randomId = genRandomId();
  peer = new Peer(randomId, { host: '0.peerjs.com', port: 443, path: '/', secure: true, debug: 0 });
  peer.on('open', function(id) {
    conn = peer.connect(targetId, { reliable: true, serialization: 'json' });
    setupConn();
    connTimeout = setTimeout(function() {
      if (!conn || !conn.open) {
        conn = null;
        hideLoading();
        setStatus('ready', 'Prêt');
        showError('❌ Mot de passe incorrect ou salle inexistante', loginError);
        setTimeout(function() {
          loginScreen.style.display = 'flex';
          waitScreen.style.display = 'none';
        }, 2000);
      }
    }, 10000);
    loginScreen.style.display = 'none';
    waitScreen.style.display = 'flex';
    waitTitle.textContent = '⏳ Connexion en cours...';
    waitMessage.innerHTML = '🔗 Connexion...';
    inviteCodeSpan.textContent = '•••';
    waitInstruction.innerHTML = 'En attente du créateur...';
    setStatus('connecting', 'Connexion...');
  });
  peer.on('error', function(err) {
    hideLoading();
    console.error(err);
    showError('Erreur: ' + (err.type || 'Connexion impossible'), loginError);
    setTimeout(function() { loginScreen.style.display = 'flex'; waitScreen.style.display = 'none'; }, 2000);
  });
}

createRoomBtn.addEventListener('click', createRoom);
joinRoomBtn.addEventListener('click', joinRoom);
cancelWait.addEventListener('click', function() {
  if (peer) { peer.destroy(); peer = null; }
  if (conn) { conn.close(); conn = null; }
  waitScreen.style.display = 'none';
  loginScreen.style.display = 'flex';
  setStatus('ready', 'Prêt');
});

// EYE TOGGLE
toggleEye.addEventListener('click', function() {
  var isPass = roomPasswordInput.type === 'password';
  roomPasswordInput.type = isPass ? 'text' : 'password';
  toggleEye.innerHTML = isPass
    ? '<i class="fas fa-eye-slash"></i>'
    : '<i class="fas fa-eye"></i>';
});

msgInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// Initialize
initTheme();
setStatus('ready', 'Prêt');
</script>
